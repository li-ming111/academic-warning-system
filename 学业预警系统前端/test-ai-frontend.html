<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>测试AI前端</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
        }
        .result {
            margin-top: 20px;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <h1>测试AI前端</h1>
    <button onclick="testAIFrontend()">测试AI回复</button>
    <div class="result" id="result"></div>

    <script>
        async function testAIFrontend() {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = '测试中...';

            try {
                // 模拟登录
                console.log('开始登录...');
                const loginResponse = await fetch('http://localhost:8081/api/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        username: '2023020616',
                        password: '123456'
                    })
                });

                console.log('登录响应状态:', loginResponse.status);
                
                if (!loginResponse.ok) {
                    throw new Error(`登录失败: ${loginResponse.status}`);
                }

                const loginData = await loginResponse.json();
                console.log('完整登录响应:', loginData);
                
                // 先显示登录响应
                resultDiv.innerHTML = `
                    <h3>登录响应:</h3>
                    <pre>${JSON.stringify(loginData, null, 2)}</pre>
                `;
                
                // 检查响应结构
                let token, userId;
                if (loginData.data) {
                    token = loginData.data.token;
                    userId = loginData.data.userId;
                } else {
                    // 尝试直接从根级获取
                    token = loginData.token;
                    userId = loginData.userId;
                }

                if (!token) {
                    throw new Error('登录响应中缺少token');
                }
                
                if (!userId) {
                    throw new Error('登录响应中缺少userId');
                }

                console.log('登录成功:', { token, userId });

                // 测试AI API
                console.log('开始调用AI API...');
                const aiResponse = await fetch('http://localhost:8081/api/ai/chat', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({
                        userId: userId.toString(),
                        message: '你是谁'
                    })
                });

                console.log('AI API响应状态:', aiResponse.status);
                
                if (!aiResponse.ok) {
                    const errorText = await aiResponse.text();
                    console.error('AI API错误响应:', errorText);
                    throw new Error(`AI API失败: ${aiResponse.status} - ${errorText}`);
                }

                const aiData = await aiResponse.json();
                console.log('AI API完整响应:', aiData);
                
                resultDiv.innerHTML = `
                    <h3>登录成功:</h3>
                    <pre>${JSON.stringify(loginData, null, 2)}</pre>
                    <h3>AI回复:</h3>
                    <p>${aiData.content}</p>
                `;
            } catch (error) {
                console.error('错误:', error);
                resultDiv.innerHTML = `
                    <h3>错误:</h3>
                    <p>${error.message}</p>
                    <h3>详细信息:</h3>
                    <pre>${error.stack}</pre>
                `;
            }
        }
    </script>
</body>
</html>
