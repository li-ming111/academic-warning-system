server:
  port: 8083
  servlet:
    context-path: /api

spring:
  application:
    name: student-service

  cloud:
    compatibility-verifier:
      enabled: false

  config:
    import-check:
      enabled: false

  datasource:
    url: jdbc:mysql://localhost:3306/academic_warning_system?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=GMT%2B8&allowPublicKeyRetrieval=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  redis:
    host: localhost
    port: 6379
    database: 0
    password: 

  security:
    user:
      name: admin
      password: admin123

eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true
    instance-id: ${spring.cloud.client.hostname}:${spring.application.name}:${server.port}

mybatis-plus:
  type-aliases-package: com.academic.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  global-config:
    db-config:
      id-type: auto

logging:
  level:
    root: INFO
    com.academic: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
  charset:
    console: UTF-8
